<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Reports</title>

<style>
body{margin:0;font-family:Segoe UI;background:#f1f5f9;}

.header{
  background:#111827;
  color:white;
  padding:20px;
}

.container{padding:25px;}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 10px 20px rgba(0,0,0,0.05);
}

.btn{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
<h2>📊 Reports Center</h2>
</div>

<div class="container">

<div class="card">
Attendance Report Summary<br><br>
<button class="btn">Download PDF</button>
</div>

<div class="card">
Monthly Analytics Report<br><br>
<button class="btn">Export Excel</button>
</div>

</div>

</body>
</html>
