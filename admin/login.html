<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - Smart School</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#4f8cff,#7dd3fc);
}

.container{
  width:350px;
  background:white;
  padding:30px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  animation:fadeIn 0.6s ease;
}

h2{
  text-align:center;
  margin-bottom:20px;
  color:#1e3a8a;
}

input, select{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#1d4ed8;
}

a{
  display:block;
  text-align:center;
  margin-top:10px;
  text-decoration:none;
  color:#2563eb;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">

<h2>🔐 Smart School Login</h2>

<select id="role">
  <option>Select Role</option>
  <option>Admin</option>
  <option>Teacher</option>
  <option>Parent</option>
</select>

<input type="text" placeholder="Email or Username">
<input type="password" placeholder="Password">

<button onclick="login()">Login</button>

<a href="register.html">Create new account</a>

</div>

<script>
function login(){
  const role = document.getElementById("role").value;

  if(role === "Admin"){
    window.location.href = "admin/dashboard.html";
  }
  else if(role === "Teacher"){
    window.location.href = "teacher/dashboard.html";
  }
  else if(role === "Parent"){
    window.location.href = "parent/dashboard.html";
  }
  else{
    alert("Please select role");
  }
}
</script>

</body>
</html>
