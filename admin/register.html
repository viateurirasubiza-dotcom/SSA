<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Account</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#60a5fa,#38bdf8);
}

.box{
  width:380px;
  background:white;
  padding:30px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{
  text-align:center;
  color:#1e3a8a;
}

input, select{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#10b981;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:#059669;
}

a{
  display:block;
  text-align:center;
  margin-top:10px;
  text-decoration:none;
  color:#2563eb;
}
</style>
</head>

<body>

<div class="box">

<h2>🆕 Create Account</h2>

<input type="text" placeholder="Full Name">
<input type="email" placeholder="Email">

<select>
  <option>Select Role</option>
  <option>Admin</option>
  <option>Teacher</option>
  <option>Parent</option>
</select>

<input type="password" placeholder="Password">

<button onclick="register()">Create Account</button>

<a href="login.html">Already have account? Login</a>

</div>

<script>
function register(){
  alert("Account created successfully (UI only)");
  window.location.href = "login.html";
}
</script>

</body>
</html>
