<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Teachers | Admin</title>

<style>
body{margin:0;font-family:Segoe UI;background:#eef2ff;}

.header{
  background:linear-gradient(90deg,#1e3a8a,#2563eb);
  color:white;
  padding:20px;
  display:flex;
  justify-content:space-between;
}

.btn{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  color:white;
}

.add{background:#10b981;}

.container{padding:25px;}

.card{
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
  border-radius:12px;
  overflow:hidden;
}

th{
  background:#111827;
  color:white;
  padding:12px;
}

td{
  padding:12px;
  border-bottom:1px solid #eee;
  text-align:center;
}

tr:hover{background:#f8fafc;}

.action{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.edit{background:#f59e0b;color:white;}
.delete{background:#ef4444;color:white;}
</style>
</head>

<body>

<div class="header">
  <h2>👨‍🏫 Teachers Management</h2>
  <button class="btn add">+ Add Teacher</button>
</div>

<div class="container">

<div class="card">
Total Teachers: <b>45</b>
</div>

<table>
<tr>
<th>Name</th>
<th>Subject</th>
<th>Phone</th>
<th>Action</th>
</tr>

<tr>
<td>Mr John</td>
<td>Math</td>
<td>0788***</td>
<td>
<button class="action edit">Edit</button>
<button class="action delete">Delete</button>
</td>
</tr>

</table>

</div>

</body>
</html>
