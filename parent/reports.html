<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Reports</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#f1f5f9;
}

.header{
  background:#111827;
  color:white;
  padding:20px;
}

.container{padding:20px;}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.btn{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
<h2>Reports</h2>
</div>

<div class="container">

<div class="card">
<h3>Monthly Attendance Report</h3>
<p>Download full attendance summary</p>
<button class="btn">Download PDF</button>
</div>

<div class="card">
<h3>Performance Report</h3>
<p>View child academic progress</p>
<button class="btn">Export Excel</button>
</div>

</div>

</body>
</html>
