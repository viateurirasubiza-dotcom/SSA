<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Notifications</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#eef2ff;
}

.header{
  background:#1d4ed8;
  color:white;
  padding:20px;
}

.container{padding:20px;}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:12px;
  box-shadow:0 5px 10px rgba(0,0,0,0.05);
}

.badge{
  display:inline-block;
  padding:5px 10px;
  border-radius:6px;
  font-size:12px;
  color:white;
}

.success{background:green;}
.warning{background:orange;}
.info{background:#2563eb;}
</style>
</head>

<body>

<div class="header">
<h2>🔔 Notifications</h2>
</div>

<div class="container">

<div class="card">
<span class="badge success">Info</span>
<p>Your child attended all classes today ✔</p>
</div>

<div class="card">
<span class="badge warning">Alert</span>
<p>Your child was absent yesterday ⚠</p>
</div>

<div class="card">
<span class="badge info">Notice</span>
<p>Parent meeting scheduled tomorrow 📢</p>
</div>

</div>

</body>
</html>
