<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - Smart School System</title>

<style>
/* ================= ROOT ================= */
:root{
  --primary:#4f8cff;
  --bg:#f1f5f9;
}

/* ================= GLOBAL ================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI", sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#4f8cff,#7dd3fc);
  transition:0.3s;
}

/* ================= LOGIN BOX ================= */
.container{
  width:380px;
  background:white;
  padding:30px;
  border-radius:18px;
  box-shadow:0 15px 40px rgba(0,0,0,0.2);
  animation:fadeIn 0.6s ease;
}

h2{
  text-align:center;
  margin-bottom:20px;
  color:#1e3a8a;
}

p{
  text-align:center;
  font-size:14px;
  color:#6b7280;
  margin-bottom:15px;
}

/* ================= INPUTS ================= */
input, select{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #ddd;
  outline:none;
  transition:0.3s;
}

input:focus{
  border-color:var(--primary);
  box-shadow:0 0 5px rgba(79,140,255,0.4);
}

/* ================= BUTTON ================= */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:var(--primary);
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
  transition:0.3s;
}

button:hover{
  background:#2563eb;
  transform:scale(1.02);
}

/* ================= LINKS ================= */
a{
  display:block;
  text-align:center;
  margin-top:10px;
  text-decoration:none;
  color:#2563eb;
  font-size:14px;
}

/* ================= ROLE BADGE ================= */
.role{
  text-align:center;
  margin-bottom:10px;
  padding:6px 10px;
  background:#e0f2fe;
  color:#0369a1;
  border-radius:8px;
  font-size:13px;
  font-weight:500;
}

/* ================= ANIMATION ================= */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* ================= DARK MODE ================= */
.dark{
  background:#0f172a;
}

.dark .container{
  background:#1e293b;
  color:white;
}

.dark input,
.dark select{
  background:#0f172a;
  color:white;
  border:1px solid #334155;
}

.dark h2{
  color:white;
}

.dark p{
  color:#cbd5e1;
}
</style>

</head>

<body>

<div class="container">

<h2>🔐 Smart School Login</h2>

<div class="role" id="roleBox">Role: Not selected</div>

<input type="text" placeholder="Email or Username">
<input type="password" placeholder="Password">

<select id="roleSelect">
  <option value="">Select Role</option>
  <option value="admin">Admin</option>
  <option value="teacher">Teacher</option>
  <option value="parent">Parent</option>
</select>

<button onclick="login()">Login</button>

<a href="register.html">Create new account</a>

</div>

<script>
// ================= GET ROLE FROM URL =================
const params = new URLSearchParams(window.location.search);
let role = params.get("role");

const roleBox = document.getElementById("roleBox");
const roleSelect = document.getElementById("roleSelect");

if(role){
  roleBox.innerText = "Role: " + role.toUpperCase();
  roleSelect.value = role;
}

// ================= LOGIN FUNCTION =================
function login(){

  let selectedRole = roleSelect.value;

  if(!selectedRole){
    alert("Please select role");
    return;
  }

  // redirect based on role
  if(selectedRole === "admin"){
    window.location.href = "admin/dashboard.html";
  }

  else if(selectedRole === "teacher"){
    window.location.href = "teacher/dashboard.html";
  }

  else if(selectedRole === "parent"){
    window.location.href = "parent/dashboard.html";
  }

}
</script>

</body>
</html>
