<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Students</title>

<style>
body{margin:0;font-family:Segoe UI;background:#f4f6fb;}

.header{
  background:#2563eb;
  color:white;
  padding:20px;
  display:flex;
  justify-content:space-between;
}

.container{padding:20px;}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
  border-radius:10px;
  overflow:hidden;
}

th{
  background:#111827;
  color:white;
  padding:12px;
}

td{
  padding:12px;
  border-bottom:1px solid #eee;
  text-align:center;
}

.btn{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.view{background:#3b82f6;color:white;}
</style>
</head>

<body>

<div class="header">
<h2>Students List</h2>
</div>

<div class="container">

<table>
<tr>
<th>Name</th>
<th>Class</th>
<th>Status</th>
<th>Action</th>
</tr>

<tr>
<td>John Doe</td>
<td>S3</td>
<td>Active</td>
<td><button class="btn view">View</button></td>
</tr>

<tr>
<td>Mary Jane</td>
<td>S2</td>
<td>Active</td>
<td><button class="btn view">View</button></td>
</tr>

</table>

</div>

</body>
</html>
