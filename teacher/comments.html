<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Comments</title>

<style>
body{margin:0;font-family:Segoe UI;background:#fff7ed;}

.header{
  background:#f59e0b;
  color:white;
  padding:20px;
}

.container{padding:20px;}

textarea{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid #ddd;
}

.btn{
  margin-top:10px;
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-top:15px;
}
</style>
</head>

<body>

<div class="header">
<h2>Student Comments</h2>
</div>

<div class="container">

<textarea rows="4" placeholder="Write feedback..."></textarea>
<button class="btn">Send Comment</button>

<div class="card">
✔ John Doe - Good performance
</div>

<div class="card">
⚠ Mary Jane - Needs improvement
</div>

</div>

</body>
</html>
