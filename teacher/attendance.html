/* ================= VARIABLES ================= */
let students = [];
let currentDay = localStorage.getItem("currentDay")
  ? parseInt(localStorage.getItem("currentDay"))
  : 1;
let attendanceState = {};

/* ================= LOAD CLASS ================= */
function loadClassStudents(){
  let cls = document.getElementById("classSelect").value;

  // load from localStorage first
  let saved = localStorage.getItem("students_" + cls);

  if(saved){
    students = JSON.parse(saved);
  }else{
    students = classStudents[cls] || [];
  }

  renderStudents();
}
/* ================= RENDER STUDENTS ================= */
function renderStudents(){

  let table = document.getElementById("studentTable");

  table.innerHTML = `
    <tr>
      <th>Student</th>
      <th>Present</th>
      <th>Absent</th>
      <th>Action</th>
    </tr>
  `;

  students.forEach((s,i)=>{

    table.innerHTML += `
      <tr>
        <td>${s}</td>

        <!-- PRESENT BOX -->
        <td>
          <div onclick="markPresent(${i})"
               style="width:30px;height:30px;border:2px solid #22c55e;
                      display:flex;align-items:center;justify-content:center;
                      cursor:pointer;border-radius:6px;font-weight:bold;
                      background:${attendanceState[i] === "Present" ? "#22c55e" : "transparent"};
                      color:${attendanceState[i] === "Present" ? "white" : "black"};">
            ${attendanceState[i] === "Present" ? "✔" : ""}
          </div>
        </td>

        <!-- ABSENT BOX -->
        <td>
          <div onclick="markAbsent(${i})"
               style="width:30px;height:30px;border:2px solid #ef4444;
                      display:flex;align-items:center;justify-content:center;
                      cursor:pointer;border-radius:6px;font-weight:bold;
                      background:${attendanceState[i] === "Absent" ? "#ef4444" : "transparent"};
                      color:${attendanceState[i] === "Absent" ? "white" : "black"};">
            ${attendanceState[i] === "Absent" ? "✖" : ""}
          </div>
        </td>

        <td>
          <button onclick="deleteStudent(${i})" class="delete">
            🗑 Delete
          </button>
        </td>
      </tr>
    `;
  });
}
/* ================= SAVE ================= */


/* ================= HISTORY ================= */
function saveAttendance(){

  let className = document.getElementById("classSelect").value;
  let subject = document.getElementById("subject").value;
  let date = new Date().toLocaleString();

  let history = JSON.parse(localStorage.getItem("attendanceHistory")) || [];

  students.forEach((s,i)=>{

    let status = attendanceState[i] || "Not Marked";

    history.push({
      student: s,
      status: status,
      className: className,
      subject: subject,
      date: date,
      day: "Day " + currentDay
    });

  });

  localStorage.setItem("attendanceHistory", JSON.stringify(history));

  currentDay++;
  localStorage.setItem("currentDay", currentDay);

  attendanceState = {}; // reset

  renderHistory();
  generateWeeklySummary();

  alert("Attendance Saved ✔");
}
/* ================= WEEK SUMMARY ================= */
function generateWeeklySummary(){

  let history = JSON.parse(localStorage.getItem("attendanceHistory")) || [];
  let summary = {};

  history.forEach(h=>{
    if(!summary[h.student]){
      summary[h.student] = {p:0,a:0};
    }

    if(h.status === "Present") summary[h.student].p++;
    else if(h.status === "Absent") summary[h.student].a++;
  });

  let table = document.getElementById("weekTable");

  table.innerHTML = `
    <tr>
      <th>Student</th>
      <th>Present</th>
      <th>Absent</th>
      <th>%</th>
      <th>Action</th>
    </tr>
  `;

  let index = 0;

  for(let s in summary){

    let p = summary[s].p;
    let a = summary[s].a;
    let total = p + a;
    let percent = total ? Math.round((p/total)*100) : 0;

    table.innerHTML += `
      <tr>
        <td>${s}</td>
        <td>${p}</td>
        <td>${a}</td>
        <td>${percent}%</td>
        <td>
          <button class="delete" onclick="deleteWeeklyStudent('${s}')">
            🗑 Delete
          </button>
        </td>
      </tr>
    `;
  }
}
function deleteWeeklyStudent(studentName){

  let history = JSON.parse(localStorage.getItem("attendanceHistory")) || [];

  // remove all records of that student
  history = history.filter(h => h.student !== studentName);

  localStorage.setItem("attendanceHistory", JSON.stringify(history));

  generateWeeklySummary();
  renderHistory();

  alert("Deleted from weekly summary ✔");
}


// load saved students (optional improvement)
function getStoredStudents(cls){
  return JSON.parse(localStorage.getItem("students_" + cls)) || classStudents[cls] || [];
}

// SAVE STUDENTS INTO LOCAL STORAGE
function saveStudentsToStorage(){
  let cls = document.getElementById("classSelect").value;
  localStorage.setItem("students_" + cls, JSON.stringify(students));
}

// ADD STUDENT FUNCTION
function addStudent(){
  let name = document.getElementById("studentName").value;

  if(name.trim() === ""){
    alert("Enter student name");
    return;
  }

  students.push(name);
  saveStudentsToStorage();
  renderStudents();

  document.getElementById("studentName").value = "";
}
function markPresent(i){
  attendanceState[i] = "Present";
  renderStudents();
}

function markAbsent(i){
  attendanceState[i] = "Absent";
  renderStudents();
}


/* ================= INIT ================= */
function renderHistory(){

  let table = document.getElementById("historyTable");
  let history = JSON.parse(localStorage.getItem("attendanceHistory")) || [];

  table.innerHTML = `
    <tr>
      <th>Student</th>
      <th>Status</th>
      <th>Class</th>
      <th>Subject</th>
      <th>Date</th>
      <th>Day</th>
      <th>Action</th>
    </tr>
  `;

  history.forEach((h,index)=>{
    table.innerHTML += `
      <tr>
        <td>${h.student}</td>
        <td>${h.status}</td>
        <td>${h.className}</td>
        <td>${h.subject}</td>
        <td>${h.date}</td>
        <td>${h.day}</td>
        <td>
          <button class="delete" onclick="deleteHistoryRow(${index})">
            🗑 Delete
          </button>
        </td>
      </tr>
    `;
  });
}
function deleteHistoryRow(index){

  let history = JSON.parse(localStorage.getItem("attendanceHistory")) || [];

  history.splice(index, 1);

  localStorage.setItem("attendanceHistory", JSON.stringify(history));

  renderHistory();
  generateWeeklySummary();

  alert("History deleted ✔");
}
function toggleWeeklySummary(){
  let table = document.getElementById("weekTable");

  if(table.style.display === "none"){
    table.style.display = "table";
    generateWeeklySummary();
  } else {
    table.style.display = "none";
  }
}
function toggleHistory(){
  let table = document.getElementById("historyTable");

  if(table.style.display === "none"){
    table.style.display = "table";
    renderHistory();
  } else {
    table.style.display = "none";
  }
}
function clearAllHistory(){

  if(confirm("Are you sure you want to delete ALL history?")){

    localStorage.removeItem("attendanceHistory");

    renderHistory();
    generateWeeklySummary();

    alert("All history cleared ✔");
  }
}
  function deleteStudent(i){
  let cls = document.getElementById("classSelect").value;

  if(confirm("Urifuza gusiba uyu munyeshuri?")){

    // remove student from array
    students.splice(i, 1);

    // save updated list
    localStorage.setItem("students_" + cls, JSON.stringify(students));

    // remove attendance state
    delete attendanceState[i];

    // re-render table
    renderStudents();

    alert("Umunyeshuri yasibwe ✔");
  }
}
