}

/* ================= RENDER STUDENTS ================= */

/* ================= HISTORY ================= */
function saveAttendance(){

  let className = document.getElementById("classSelect").value;
  let subject = document.getElementById("subject").value;
  let date = new Date().toLocaleString();

  let history = JSON.parse(localStorage.getItem("attendanceHistory")) || [];

  students.forEach((s,i)=>{

    let status = attendanceState[i] || "Not Marked";

    history.push({
      student: s,
      status: status,
      className: className,
      subject: subject,
      date: date,
      day: "Day " + currentDay
    });
  });

  localStorage.setItem("attendanceHistory", JSON.stringify(history));

  currentDay++;
  localStorage.setItem("currentDay", currentDay);

  attendanceState = {}; // reset

  renderHistory();
}
/* ================= WEEK SUMMARY ================= */
function generateWeeklySummary(){

  let history = JSON.parse(localStorage.getItem("attendanceHistory")) || [];

  let summary = {};

  history.forEach(h=>{
    if(!summary[h.student]){
      summary[h.student] = {p:0,a:0};
    }

    if(h.status === "Present") summary[h.student].p++;
    else if(h.status === "Absent") summary[h.student].a++;
  });

  let table = document.getElementById("weekTable");

  table.innerHTML = `
    <tr>
      <th>Student</th>
      <th>Present</th>
      <th>Absent</th>
      <th>%</th>
    </tr>
  `;

  for(let s in summary){

    let p = summary[s].p;
    let a = summary[s].a;
    let total = p + a;
    let percent = total ? Math.round((p/total)*100) : 0;

    table.innerHTML += `
      <tr>
        <td>${s}</td>
        <td>${p}</td>
        <td>${a}</td>
        <td>${percent}%</td>
      </tr>
    `;
  }
}

        </td>
      </tr>
    `;
  });
}

function getStoredStudents(cls){
  return JSON.parse(localStorage.getItem("students_" + cls)) || classStudents[cls] || [];

// SAVE STUDENTS INTO LOCAL STORAGE
function saveStudentsToStorage(){
  let cls = document.getElementById("classSelect").value;
  localStorage.setItem("students_" + cls, JSON.stringify(students));
}

// ADD STUDENT FUNCTION
function addStudent(){
  let name = document.getElementById("studentName").value;

  if(name.trim() === ""){
    alert("Enter student name");
    return;
  }

  students.push(name);
  saveStudentsToStorage();
  renderStudents();

  document.getElementById("studentName").value = "";
}
function markPresent(i){

  document.getElementById(`present-${i}`).innerHTML = "✔";
  document.getElementById(`absent-${i}`).innerHTML = "";
}
function markAbsent(i){

  document.getElementById(`absent-${i}`).innerHTML = "✖";
  document.getElementById(`present-${i}`).innerHTML = "";
}
