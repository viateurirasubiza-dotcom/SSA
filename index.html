<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Attendance System</title>

<style>
/* ================= GLOBAL STYLE ================= */
body{
  margin:0;
  font-family: "Segoe UI", sans-serif;
  background: linear-gradient(135deg,#4facfe,#00f2fe);
  color:#fff;
  transition:0.3s;
}

/* ================= NAVBAR ================= */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  background:rgba(0,0,0,0.2);
  backdrop-filter:blur(10px);
}

nav h2{
  margin:0;
}

nav button{
  padding:8px 15px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

/* ================= HERO ================= */
.hero{
  text-align:center;
  margin-top:100px;
  animation:fadeIn 1s ease-in-out;
}

.hero h1{
  font-size:45px;
}

.hero p{
  font-size:18px;
  opacity:0.9;
}

/* ================= CARDS ================= */
.cards{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:50px;
  flex-wrap:wrap;
}

.card{
  background:white;
  color:black;
  padding:20px;
  width:250px;
  border-radius:15px;
  box-shadow:0 10px 20px rgba(0,0,0,0.2);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
}

.card h3{
  margin-top:0;
}

.btn{
  display:inline-block;
  margin-top:10px;
  padding:10px;
  background:#4facfe;
  color:white;
  text-decoration:none;
  border-radius:8px;
}

/* ================= DARK MODE ================= */
.dark{
  background:#0f172a;
  color:white;
}

.dark .card{
  background:#1e293b;
  color:white;
}

/* ================= ANIMATION ================= */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav>
  <h2>🎓 Smart Attendance</h2>
  <button onclick="toggleDark()">🌙 Dark Mode</button>
</nav>

<!-- HERO SECTION -->
<div class="hero">
  <h1>Welcome to Attendance System</h1>
  <p>Connecting Admin, Teachers & Parents in real-time</p>
</div>

<!-- ROLE CARDS -->
<div class="cards">

  <div class="card">
    <h3>👨‍💼 Admin</h3>
    <p>Manage students, teachers & reports</p>
    <a href="admin/dashboard.html" class="btn">Enter</a>
  </div>

  <div class="card">
    <h3>👨‍🏫 Teacher</h3>
    <p>Mark attendance & track students</p>
    <a href="teacher/dashboard.html" class="btn">Enter</a>
  </div>

  <div class="card">
    <h3>👨‍👩‍👧 Parent</h3>
    <p>Monitor child attendance daily</p>
    <a href="parent/dashboard.html" class="btn">Enter</a>
  </div>

</div>

<script>
function toggleDark(){
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
